          limit: 10
          page: 1
      responses:
        "200":
          application/json: {"posts": [], "pagination": {"limit": 590415, "currentPage": 842309, "nextPage": 372360, "previousPage": 451485, "totalPages": 525847, "totalItems": 923782}}
        "400":
          application/json: {"error": "<value>"}
        "503":
          application/json: {"error": "<value>"}
  getPost:
    speakeasy-default-get-post:
      parameters:
        path:
          organizationId: "org_123"
          postId: "post_123"
      responses:
        "200":
          application/json: {"post": {"id": "<id>", "title": "<value>", "content": "<value>", "markdown": "<value>", "recommendations": "<value>", "contentType": "<value>", "status": "draft", "createdAt": "1717103742320", "updatedAt": "1735642854932"}}
        "400":
          application/json: {"error": "<value>"}
        "503":
          application/json: {"error": "<value>"}
  deletePost:
    speakeasy-default-delete-post:
      parameters:
