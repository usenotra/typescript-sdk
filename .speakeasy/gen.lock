releaseNotes: "## Typescript SDK Changes:\n* `notra.content.listPosts()`:  `response.posts[]` **Changed** (Breaking ⚠️)\n* `notra.content.getPost()`:  `response.post` **Changed** (Breaking ⚠️)\n* `notra.content.updatePost()`:  `response.post` **Changed** (Breaking ⚠️)\n* `notra.chats.createChat()`: \n  *  `request.model` **Changed** (Breaking ⚠️)\n* `notra.chats.postChatMessage()`: \n  *  `request.body.model` **Changed** (Breaking ⚠️)\n* `notra.discovery.getPublicApiStatus()`: **Added**\n* `notra.content.createPostGeneration()`: \n  *  `request.contentType.enum(image)` **Added**\n  *  `response.job.contentType.enum(image)` **Added**\n* `notra.content.getPostGeneration()`:  `response.job.contentType.enum(image)` **Added**\n* `notra.schedules.listSchedules()`:  `response.schedules[].outputType.enum(image)` **Added**\n* `notra.schedules.createSchedule()`: \n  *  `request.outputType.enum(image)` **Added**\n  *  `response.schedule.outputType.enum(image)` **Added**\n* `notra.schedules.updateSchedule()`: \n  *  `request.body.outputType.enum(image)` **Added**\n  *  `response.schedule.outputType.enum(image)` **Added**\n"
